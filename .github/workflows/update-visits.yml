name: Update visit chart

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-visits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch traffic views
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -fSsL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/traffic/views" \
            -o views.json

      - name: Merge data and render chart
        run: |
          python scripts/plot_visits.py --ingest views.json
          rm -f views.json

      - name: Commit updated chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/visits.csv assets/visits.svg
          if git diff --cached --quiet; then
            echo "No visit changes to commit."
          else
            git commit -m "chore: update visit chart [skip ci]"
            git push
          fi
